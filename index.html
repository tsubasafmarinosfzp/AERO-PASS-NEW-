<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AERO PASS</title>
    <style>
        :root { --ana-navy: #002D72; --ana-blue: #007FFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: linear-gradient(135deg, #051937, #004d7a); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; text-align: center; }
        .panel { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); border-radius: 20px; padding: 30px; margin: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .btn { background: var(--ana-blue); color: white; border: none; padding: 16px; border-radius: 40px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; padding: 12px; color: white; margin-top: 10px; outline: none; }
    </style>
</head>
<body>
    <h1 style="margin-top: 50px; font-style: italic; font-weight: 900;">✈︎ AERO PASS</h1>
    <div class="panel">
        <p>新しい滑走路「Pages」へようこそ</p>
        <input type="text" placeholder="目標勉強時間">
        <button class="btn">Take Off!</button>
    </div>
</body>
</html>
