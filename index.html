<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AERO PASS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --ana-navy: #002D72; --ana-blue: #007FFF;
            --glass: rgba(255, 255, 255, 0.12); --glass-border: rgba(255, 255, 255, 0.25);
            --panel-dark: rgba(0, 20, 50, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #001f5c 0%, #003399 100%); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 画面制御 */
        .screen { display: none; flex: 1; overflow-y: auto; padding: 20px 20px 100px 20px; animation: fadeIn 0.3s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 起動画面 (Image 5) */
        #launch-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; background: url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=1000') center/cover; }
        #launch-screen::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,45,114,0.4); z-index:-1; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2); }

        /* ボトムナビ (白背景) */
        #bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: #ffffff; display: none; justify-content: space-around; align-items: center; border-top: 1.5px solid var(--ana-navy); z-index: 150; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { color: #888; font-size: 10px; text-align: center; flex: 1; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .nav-item.active { color: var(--ana-navy); font-weight: bold; }
        .nav-icon { font-size: 22px; }

        /* ホーム計器 (Image 4 Left) */
        .dials { display: flex; justify-content: center; align-items: flex-end; gap: 10px; margin-bottom: 20px; }
        .dial { background: #111; border: 2px solid #555; border-radius: 50%; box-shadow: inset 0 0-10px #000; display: flex; align-items: center; justify-content: center; }
        .dial-lg { width: 80px; height: 80px; font-size: 30px; border-color: var(--ana-blue); }
        .progress-circle { width: 100px; height: 100px; border-radius: 50%; border: 6px solid var(--ana-blue); border-top-color: transparent; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }

        /* 進捗DB：滑走路 & 本棚 (Image 2) */
        .runway { height: 35px; background: #222; border: 1px dashed rgba(255,255,255,0.4); margin-bottom: 15px; position: relative; display: flex; align-items: center; border-radius: 4px; }
        .plane { position: absolute; font-size: 20px; transition: 1s; }
        .bookshelf { height: 110px; background: #8B4513; border-bottom: 10px solid #5D2E00; display: flex; align-items: flex-end; padding: 0 10px; gap: 4px; box-shadow: inset 0 -10px 20px rgba(0,0,0,0.5); }
        .book { width: 25px; height: 85px; color: white; writing-mode: vertical-rl; font-size: 9px; text-align: center; border-left: 2px solid rgba(255,255,255,0.2); box-shadow: -2px 0 5px rgba(0,0,0,0.4); }

        /* スコア記録・ギャップ分析 (Image 1) */
        .chart-container { background: white; border-radius: 10px; padding: 10px; height: 200px; }

        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 10px; padding: 12px; color: white; margin-top: 10px; outline: none; }
        .btn { background: var(--ana-blue); color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body onload="initApp()">

    <div id="launch-screen">
        <h1 style="font-size: 42px; font-style: italic; font-weight: 900; margin-bottom: 30px;">✈︎ AERO PASS</h1>
        <div class="glass-panel" style="width: 90%; max-width: 380px;">
            <p style="text-align:center; font-size: 11px; letter-spacing: 2px; margin-bottom:15px;">TODAY'S FLIGHT PLAN</p>
            <input type="text" id="targetTime" placeholder="目標勉強時間（例: 6時間）">
            <input type="text" id="keyTask" placeholder="重点課題（例: 物理の電磁気）">
            <button class="btn" onclick="takeOff()">Take Off!</button>
        </div>
    </div>

    <div id="home" class="screen">
        <h1 style="text-align:center; font-style:italic; margin-bottom:20px;">AERO PASS</h1>
        <div class="dials"><div class="dial dial-lg">✈️</div></div>
        <div class="glass-panel" style="text-align:center; background: var(--panel-dark);">
            <div class="progress-circle">55%</div>
            <p style="font-size: 10px; color: #ccc; margin-top: 10px;">ANA Tntpn/White 進捗 : 53%</p>
        </div>
        <div class="glass-panel" style="margin-top:20px;">
            <p id="dispTime" style="font-weight: bold;"></p>
            <p id="dispTask" style="font-size: 13px; opacity: 0.8;"></p>
        </div>
    </div>

    <div id="mock" class="screen">
        <h1 style="text-align:center; font-style:italic; margin-bottom:20px;">MOCK EXAMS</h1>
        <div class="glass-panel" style="background: white;">
            <div class="chart-container"><canvas id="mockChart"></canvas></div>
        </div>
        <div class="glass-panel" style="margin-top:20px;">
            <input type="number" id="engScore" placeholder="英語">
            <input type="number" id="gen1Score" placeholder="総合I">
            <input type="number" id="gen2Score" placeholder="総合II">
            <button class="btn" onclick="addMockRecord()">スコアを保存</button>
        </div>
    </div>

    <div id="progress" class="screen">
        <h1 style="text-align:center; font-size:22px;">進捗管理<br><small style="font-size:12px;">滑走路進行状況図</small></h1>
        <div class="glass-panel" style="background: rgba(0,0,0,0.3); margin-top:20px;">
            <div class="runway"><div class="plane" style="left: 60%;">✈️</div></div>
            <div class="runway"><div class="plane" style="left: 30%;">✈️</div></div>
        </div>
        <div class="bookshelf">
            <div class="book" style="background: #2ecc71;">青チャート</div>
            <div class="book" style="background: #e67e22; height: 95px;">物理風</div>
            <div class="book" style="background: #3498db; height: 105px;">英語過去問</div>
        </div>
    </div>

    <nav id="bottom-nav">
        <div class="nav-item active" onclick="showPage('home', this)"><span class="nav-icon">🏠</span>ホーム</div>
        <div class="nav-item" onclick="showPage('mock', this)"><span class="nav-icon">🏆</span>模試</div>
        <div class="nav-item" onclick="showPage('progress', this)"><span class="nav-icon">📊</span>進捗DB</div>
    </nav>

    <script>
        const API_KEY = 'ここにあなたのAPIキー'; 
        let myChart;
        let mockRecords = JSON.parse(localStorage.getItem('mockRecords')) || [];

        function initApp() {
            const savedTime = localStorage.getItem('targetTime');
            const savedTask = localStorage.getItem('keyTask');
            if (savedTime && savedTask) {
                document.getElementById('dispTime').innerText = "目標時間：" + savedTime;
                document.getElementById('dispTask').innerText = "重点課題：" + savedTask;
                document.getElementById('launch-screen').style.display = 'none';
                document.getElementById('bottom-nav').style.display = 'flex';
                showPage('home', document.querySelector('.nav-item'));
            }
        }
        function takeOff() {
            const time = document.getElementById('targetTime').value;
            const task = document.getElementById('keyTask').value;
            if(!time || !task) return alert('入力してください');
            localStorage.setItem('targetTime', time);
            localStorage.setItem('keyTask', task);
            location.reload();
        }
        function showPage(pageId, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            if(pageId === 'mock') updateChart();
        }
        function addMockRecord() {
            const e = document.getElementById('engScore').value;
            const g1 = document.getElementById('gen1Score').value;
            const g2 = document.getElementById('gen2Score').value;
            if(!e || !g1 || !g2) return alert('点数を入れてください');
            mockRecords.push({ date: new Date().toLocaleDateString(), score: parseInt(e)+parseInt(g1)+parseInt(g2) });
            localStorage.setItem('mockRecords', JSON.stringify(mockRecords));
            updateChart();
        }
        function updateChart() {
            const ctx = document.getElementById('mockChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: mockRecords.map(r => r.date),
                    datasets: [{ label: '総合', data: mockRecords.map(r => r.score), borderColor: '#002D72', tension: 0.3 }]
                }
            });
        }
    </script>
</body>
</html>
