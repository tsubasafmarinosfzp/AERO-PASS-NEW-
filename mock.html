<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERO PASS - FDR & テスト記録</title>
    <style>
        /* ベース設定：スマホ向けの縦長レイアウト */
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: linear-gradient(135deg, #001f3f, #003366); /* 航空機をイメージした深い青のグラデーション */
            color: white;
            min-height: 100vh;
        }

        /* アプリ全体を囲うコンテナ */
        .app-container {
            padding: 20px 15px 80px 15px; /* 下部はナビゲーション用に空ける */
            box-sizing: border-box;
        }

        /* ヘッダー部分 */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 { margin: 0; font-size: 24px; font-style: italic; letter-spacing: 2px; }
        .header p { margin: 5px 0 0 0; font-size: 12px; opacity: 0.8; }

        /* グラスモーフィズム（すりガラス）のパネル */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .glass-panel h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 8px;
        }

        /* 入力フォームのスタイル */
        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        .input-group label {
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.9;
        }
        .input-group input, .input-group textarea {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .input-group input:focus, .input-group textarea:focus {
            border-color: #00aaff;
            background: rgba(0, 0, 0, 0.4);
        }
        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* 保存ボタン */
        .btn-save {
            width: 100%;
            background: linear-gradient(90deg, #005c99, #00aaff);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 170, 255, 0.3);
            transition: 0.2s;
        }
        .btn-save:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>AERO PASS</h1>
        <p>模擬試験＆他テスト記録 (FDRモード)</p>
    </div>

    <div class="glass-panel">
        <h2>📊 模試スコア記録</h2>
        <div class="input-group">
            <label>模試実施日</label>
            <input type="date" id="examDate">
        </div>
        <div class="input-group">
            <label>英語 (100点満点)</label>
            <input type="number" id="scoreEnglish" placeholder="例: 85">
        </div>
        <div class="input-group">
            <label>総合I (100点満点)</label>
            <input type="number" id="scoreTotal1" placeholder="例: 70">
        </div>
        <div class="input-group">
            <label>総合II (150点満点)</label>
            <input type="number" id="scoreTotal2" placeholder="例: 120">
        </div>
    </div>

    <div class="glass-panel">
        <h2>👨‍✈️ AIキャプテンと戦略アップデート</h2>
        <div class="input-group">
            <label>次回のフライト（学習）戦略を記録</label>
            <textarea id="aiStrategy" placeholder="例: TOEICリーディングも並行して強化する..."></textarea>
        </div>
        <button class="btn-save" onclick="saveRecord()">戦略を保存・記録</button>
    </div>
</div>

<script>
    // 変数を取得して保存する「ロジック（魂）」の部分
    function saveRecord() {
        // 入力された値（変数）をすべて回収する
        const record = {
            date: document.getElementById('examDate').value,
            english: document.getElementById('scoreEnglish').value,
            total1: document.getElementById('scoreTotal1').value,
            total2: document.getElementById('scoreTotal2').value,
            strategy: document.getElementById('aiStrategy').value
        };

        // バリデーション（入力漏れチェック）
        if(!record.date || !record.english) {
            alert("キャプテン、実施日と英語のスコアは必須項目です。");
            return;
        }

        // スマホのブラウザにデータを保存（JSONに変換して格納）
        // ※ 本来はここでデータベースに送りますが、まずはローカル保存で動かします
        localStorage.setItem('latestMockRecord', JSON.stringify(record));

        alert("✅ フライトデータレコーダー（FDR）に記録を保存しました！");
    }
</script>

</body>
</html>
