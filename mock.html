        .app-container {

            background: radial-gradient(circle at top, #003366 0%, #001220 100%);
            padding: 20px 20px 90px 20px; /* ナビバー分の余白 */
            box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-style: italic; letter-spacing: 3px; font-size: 24px; margin: 0; }
        .header p { font-size: 11px; opacity: 0.7; margin-top: 5px; }

        /* グラスモーフィズムパネル */
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
        }

        .glass-panel h2 { margin: 0 0 15px 0; font-size: 16px; color: #00aaff; border-bottom: 1px solid rgba(0,170,255,0.2); padding-bottom: 8px; }

        /* 入力フォーム群 */
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-group label { font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
        .input-group input, .input-group textarea {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 12px; border-radius: 10px; font-size: 15px; outline: none;
        }
        .input-group input:focus { border-color: #00aaff; background: rgba(0, 0, 0, 0.5); }

        .btn-save {
            width: 100%; background: linear-gradient(90deg, #005c99, #00aaff);
            color: white; border: none; padding: 16px; border-radius: 30px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,170,255,0.3);
        }
        .btn-save:active { transform: scale(0.98); }

        /* --- ボトムナビゲーション --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(0, 0, 0, 0.1); z-index: 9999;
        }
        .nav-item { text-decoration: none; color: #666; display: flex; flex-direction: column; align-items: center; font-size: 10px; flex: 1; }
        .nav-item.active { color: #00aaff; font-weight: bold; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>

        </div>
        <button class="btn-save" onclick="saveRecord()">記録を保存する</button>
    </div>
</div>
